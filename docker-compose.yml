services:
  wud:
    image: fmartinou/whats-up-docker
    container_name: wud
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ}
      - WUD_TRIGGER_HTTP_NTFY_URL=${NTFY_URL}/${NTFY_TOPIC}
      - WUD_TRIGGER_HTTP_NTFY_MOCK=false
      - WUD_TRIGGER_HTTP_NTFY_HEADERS_AUTHORIZATION=Bearer ${NTFY_TOKEN}
      - WUD_TRIGGER_HTTP_NTFY_HEADERS_X-TITLE=WUD
      - WUD_TRIGGER_HTTP_NTFY_HEADERS_CONTENT-TYPE=text/plain
      - WUD_TRIGGER_HTTP_NTFY_BODY=Container {{app}} updated to {{version}}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - wud-net

networks:
  frontend:
    external: true
  wud-net:
    name: wud-net
    driver: bridge
